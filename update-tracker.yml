name: Daily Accountability Tracker Update

on:
  schedule:
    # 7:00 AM CT = 13:00 UTC (CDT, summer) / 12:00 UTC (CST, winter)
    # Using 13:00 UTC to cover CDT (summer). Adjust to 12:00 in winter.
    - cron: '0 13 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node daily-agent.js
